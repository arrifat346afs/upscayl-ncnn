name: release

on:
  workflow_dispatch:

env:
  APPLICATION_NAME: upscayl-bin
  VK_VERSION: 1.3.283.0

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      APPNAME: ${{ steps.app.outputs.APPNAME }}
      VERSION: ${{ steps.ver.outputs.VERSION }}
    steps:
      - id: app
        run: echo "APPNAME=${APPLICATION_NAME}" >> "$GITHUB_OUTPUT"
      - id: ver
        run: echo "VERSION=$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

  # ---------------- Linux ----------------
  ubuntu:
    needs: setup
    runs-on: ubuntu-22.04
    env:
      PACKAGENAME: ${{ needs.setup.outputs.APPNAME }}-${{ needs.setup.outputs.VERSION }}-linux
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Vulkan SDK
        run: |
          wget https://sdk.lunarg.com/sdk/download/${VK_VERSION}/linux/vulkansdk-linux-x86_64-${VK_VERSION}.tar.xz?Human=true -O vk.tar.xz
          tar xf vk.tar.xz
          rm -rf ${VK_VERSION}/source ${VK_VERSION}/samples

      - name: Build
        run: |
          sudo apt update
          sudo apt install -y gcc-9 g++-9
          export CC=gcc-9 CXX=g++-9
          export VULKAN_SDK=$(pwd)/${VK_VERSION}/x86_64
          mkdir build && cd build
          cmake ../src
          cmake --build . -j2

      - name: Package
        run: |
          mkdir ${{ env.PACKAGENAME }}
          cp README.md LICENSE build/${{ needs.setup.outputs.APPNAME }} ${{ env.PACKAGENAME }}
          strip ${{ env.PACKAGENAME }}/${{ needs.setup.outputs.APPNAME }}
          zip -9r ${{ env.PACKAGENAME }}.zip ${{ env.PACKAGENAME }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGENAME }}
          path: ${{ env.PACKAGENAME }}.zip

  # ---------------- GitHub Release ----------------
  release:
    needs: [ubuntu, setup]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.setup.outputs.VERSION }}
          name: upscayl-bin-${{ needs.setup.outputs.VERSION }}
          files: artifacts/**/**/*.zip
